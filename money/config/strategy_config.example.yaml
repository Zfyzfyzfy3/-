# QuantTrading 配置模板
# 说明：
# 1) 运行时请将本文件内容复制到 strategy_config.yaml，或直接按相同结构修改 strategy_config.yaml
# 2) 敏感信息（api.key / api.secret）也在该配置文件中维护，请勿提交到公开仓库

api:
  key: "YOUR_API_KEY"
  secret: "YOUR_API_SECRET"
  host: "https://api.gateio.ws/api/v4"

runtime:
  mode: "backtest"               # backtest / live
  strategy: "ma_cross"           # 当前仅支持 ma_cross
  start: null                     # 回测开始日期，示例 "2025-06-01"
  end: null                       # 回测结束日期，示例 "2025-09-01"
  no_cache: false                 # true=忽略本地缓存并重新拉取数据
  multi_intervals: []             # 多周期回测，如 ["4h", "5m"]
  poll_seconds: 60                # live 模式轮询间隔（秒）

market:
  contract: "BTC_USDT"           # 交易合约
  settle: "usdt"                 # 结算币种（当前主流程未使用）

backtest:
  initial_capital: 10000          # 初始资金（USDT）
  fee_rate: 0.0005                # 手续费率（0.05%）

ma_cross:
  fast: 300                         # MA 快线窗口（K线根数）
  slow: 1200                        # MA 慢线窗口（K线根数）
  interval: "1m"                  # K线周期: 10s/1m/5m/15m/30m/1h/2h/4h/8h/1d/7d/30d
  order_size: 0.001               # 每次开仓手数
  only_long: false                # true=仅做多
